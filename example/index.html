<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>str8 — straight skeleton gallery</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font: 14px/1.5 system-ui, sans-serif;
        background: #0e1116;
        color: #e6edf3;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      header { padding: 14px 20px; border-bottom: 1px solid #30363d; flex: none; }
      h1 { font-size: 16px; margin: 0; }
      header p { margin: 4px 0 0; color: #8b949e; font-size: 13px; }
      header a { color: #58a6ff; text-decoration: none; }

      .toolbar {
        flex: none;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 20px;
        border-bottom: 1px solid #30363d;
        flex-wrap: wrap;
      }
      label.field { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8b949e; }
      select {
        background: #161b22;
        color: #e6edf3;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 7px 10px;
        font: inherit;
        min-width: 220px;
      }
      .check { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #8b949e; user-select: none; }
      #info { font-size: 13px; color: #8b949e; }
      #info.err { color: #f85149; }
      #info b { color: #e6edf3; font-weight: 600; }
      .spacer { flex: 1; }
      button {
        background: rgba(22, 27, 34, 0.9);
        border: 1px solid #30363d;
        color: #e6edf3;
        border-radius: 6px;
        font: inherit;
        cursor: pointer;
      }
      .zoom-btn { width: 34px; height: 34px; padding: 0; font-size: 18px; line-height: 1; }
      .zoom-btn.wide { width: auto; padding: 0 12px; font-size: 13px; font-weight: 600; }

      .canvas-wrap { position: relative; flex: 1; min-height: 0; background: #0e1116; }
      canvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
      canvas.dragging { cursor: grabbing; }

      .overlay { position: absolute; display: flex; }
      .hint {
        top: 10px; right: 12px; color: #6e7681; font-size: 12px;
        background: rgba(13, 17, 23, 0.72); border: 1px solid #30363d;
        border-radius: 6px; padding: 4px 8px; pointer-events: none;
      }
      .legend {
        right: 12px; bottom: 12px; gap: 14px; align-items: center;
        background: rgba(13, 17, 23, 0.72); border: 1px solid #30363d;
        border-radius: 6px; padding: 6px 10px; color: #8b949e; font-size: 12px;
      }
      .swatch { display: inline-block; width: 12px; height: 3px; vertical-align: middle; }

      @media (max-width: 720px) {
        body { overflow: auto; }
        .canvas-wrap { height: 65vh; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>str8 — straight skeleton gallery</h1>
      <p>
        Interior straight skeletons computed with CGAL + WebAssembly. Sample
        polygons from
        <a href="https://github.com/LingDong-/interesting-polygon-archive" target="_blank" rel="noopener"
          >LingDong-/interesting-polygon-archive</a
        >.
      </p>
    </header>

    <div class="toolbar">
      <label class="field">Polygon <select id="picker"></select></label>
      <label class="check"><input type="checkbox" id="nodes" checked /> nodes</label>
      <span id="info"></span>
      <span class="spacer"></span>
      <button class="zoom-btn wide" id="fit">Fit</button>
      <button class="zoom-btn" id="zin" title="Zoom in">+</button>
      <button class="zoom-btn" id="zout" title="Zoom out">−</button>
    </div>

    <div class="canvas-wrap" id="wrap">
      <canvas id="c"></canvas>
      <div class="overlay hint">scroll to zoom · drag to pan · double-click to fit</div>
      <div class="overlay legend">
        <span><span class="swatch" style="background:#58a6ff"></span> polygon</span>
        <span><span class="swatch" style="background:#f78166"></span> skeleton</span>
        <span>node colour = time</span>
      </div>
    </div>

    <script type="module">
      import { init, buildFromPolygon } from '../dist/str8.js';

      const $ = (id) => document.getElementById(id);
      const canvas = $('c');
      const ctx = canvas.getContext('2d');
      const picker = $('picker');
      const info = $('info');

      function setInfo(html, err) {
        info.innerHTML = html;
        info.className = err ? 'err' : '';
      }

      // ---- Scene + camera (world -> screen, CSS px; y points down) --------
      let scene = null;
      const cam = { scale: 1, ox: 0, oy: 0 };
      let viewDirty = false;
      let dpr = 1;

      function sizeCanvas() {
        dpr = window.devicePixelRatio || 1;
        const w = Math.max(1, Math.round(canvas.clientWidth * dpr));
        const h = Math.max(1, Math.round(canvas.clientHeight * dpr));
        if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
      }

      function fitView() {
        if (!scene) return;
        const W = canvas.clientWidth, H = canvas.clientHeight, pad = 36;
        const { minX, minY, maxX, maxY } = scene.bounds;
        const spanX = maxX - minX || 1, spanY = maxY - minY || 1;
        cam.scale = Math.min((W - pad * 2) / spanX, (H - pad * 2) / spanY);
        const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
        cam.ox = W / 2 - cx * cam.scale;
        cam.oy = H / 2 - cy * cam.scale;
        viewDirty = false;
      }

      function draw() {
        sizeCanvas();
        const W = canvas.clientWidth, H = canvas.clientHeight;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, W, H);
        if (!scene) return;

        const sx = (x) => cam.ox + x * cam.scale;
        const sy = (y) => cam.oy + y * cam.scale; // y down
        const { rings, skel } = scene;

        // Skeleton edges.
        if (skel) {
          ctx.strokeStyle = '#f78166';
          ctx.lineWidth = 1;
          const v = skel.vertices;
          for (const face of skel.faces) {
            ctx.beginPath();
            face.forEach((idx, k) => {
              const j = idx * 3;
              const px = sx(v[j]), py = sy(v[j + 1]);
              k === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            });
            ctx.closePath();
            ctx.stroke();
          }
        }

        // Polygon outlines (outer + holes).
        ctx.strokeStyle = '#58a6ff';
        ctx.lineWidth = 2;
        for (const ring of rings) {
          ctx.beginPath();
          ring.forEach(([x, y], k) => {
            const px = sx(x), py = sy(y);
            k === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          });
          ctx.closePath();
          ctx.stroke();
        }

        // Skeleton nodes coloured by wavefront time (constant screen size).
        if (skel && $('nodes').checked) {
          const v = skel.vertices, maxTime = scene.maxTime;
          for (let i = 0; i < v.length; i += 3) {
            const t = maxTime ? v[i + 2] / maxTime : 0;
            ctx.fillStyle = `hsl(${200 - t * 160} 80% 60%)`;
            ctx.beginPath();
            ctx.arc(sx(v[i]), sy(v[i + 1]), 2.5, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      // ---- Compute one polygon -------------------------------------------
      function compute(rings) {
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const ring of rings) for (const [x, y] of ring) {
          if (x < minX) minX = x; if (y < minY) minY = y;
          if (x > maxX) maxX = x; if (y > maxY) maxY = y;
        }

        const t0 = performance.now();
        let skel = null;
        try { skel = buildFromPolygon(rings); } catch {}
        const ms = performance.now() - t0;

        let maxTime = 0;
        if (skel) for (let i = 2; i < skel.vertices.length; i += 3)
          maxTime = Math.max(maxTime, skel.vertices[i]);

        scene = { rings, skel, bounds: { minX, minY, maxX, maxY }, maxTime };
        fitView();
        draw();

        const verts = rings.reduce((s, r) => s + r.length, 0);
        const holes = rings.length - 1;
        if (skel) {
          setInfo(
            `<b>${verts}</b> vertices · <b>${holes}</b> hole${holes === 1 ? '' : 's'} · ` +
              `<b>${skel.faces.length}</b> faces · <b>${ms.toFixed(1)}</b> ms`,
          );
        } else {
          setInfo(`skeleton failed for this polygon (${verts} vertices)`, true);
        }
      }

      // ---- Boot ----------------------------------------------------------
      let polygons = [];
      Promise.all([init(), fetch('polygons.json').then((r) => r.json())]).then(([, data]) => {
        polygons = data.polygons;
        for (const p of polygons) {
          const opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.label;
          picker.appendChild(opt);
        }
        // Default to a recognizable shape if present.
        const def = polygons.find((p) => p.id === 'skimage-horse') || polygons[0];
        picker.value = def.id;
        compute(def.rings);
      }).catch((e) => setInfo(`failed to load: ${e.message}`, true));

      picker.addEventListener('change', () => {
        const p = polygons.find((p) => p.id === picker.value);
        if (p) compute(p.rings);
      });
      $('nodes').addEventListener('change', draw);

      // ---- Interaction: zoom + pan ---------------------------------------
      function pointerPos(e) {
        const r = canvas.getBoundingClientRect();
        return { x: e.clientX - r.left, y: e.clientY - r.top };
      }
      function zoomAt(mx, my, factor) {
        const wx = (mx - cam.ox) / cam.scale;
        const wy = (my - cam.oy) / cam.scale;
        cam.scale *= factor;
        cam.ox = mx - wx * cam.scale;
        cam.oy = my - wy * cam.scale;
        viewDirty = true;
        draw();
      }
      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const { x, y } = pointerPos(e);
        zoomAt(x, y, Math.exp(-e.deltaY * 0.0015));
      }, { passive: false });

      let dragging = false, lastX = 0, lastY = 0;
      canvas.addEventListener('pointerdown', (e) => {
        dragging = true;
        canvas.classList.add('dragging');
        canvas.setPointerCapture(e.pointerId);
        lastX = e.clientX; lastY = e.clientY;
      });
      canvas.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        cam.ox += e.clientX - lastX;
        cam.oy += e.clientY - lastY;
        lastX = e.clientX; lastY = e.clientY;
        viewDirty = true;
        draw();
      });
      const endDrag = (e) => {
        if (!dragging) return;
        dragging = false;
        canvas.classList.remove('dragging');
        try { canvas.releasePointerCapture(e.pointerId); } catch {}
      };
      canvas.addEventListener('pointerup', endDrag);
      canvas.addEventListener('pointercancel', endDrag);
      canvas.addEventListener('dblclick', () => { fitView(); draw(); });

      const centerZoom = (f) => zoomAt(canvas.clientWidth / 2, canvas.clientHeight / 2, f);
      $('zin').addEventListener('click', () => centerZoom(1.25));
      $('zout').addEventListener('click', () => centerZoom(1 / 1.25));
      $('fit').addEventListener('click', () => { fitView(); draw(); });

      new ResizeObserver(() => {
        sizeCanvas();
        if (scene && !viewDirty) fitView();
        draw();
      }).observe($('wrap'));
    </script>
  </body>
</html>
