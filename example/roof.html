<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>str8 — straight-skeleton roofs (3D)</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font: 14px/1.5 system-ui, sans-serif;
        background: #0e1116;
        color: #e6edf3;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      header { padding: 14px 20px; border-bottom: 1px solid #30363d; flex: none; }
      h1 { font-size: 16px; margin: 0; }
      header p { margin: 4px 0 0; color: #8b949e; font-size: 13px; }
      header a { color: #58a6ff; text-decoration: none; }

      .toolbar {
        flex: none;
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 12px 20px;
        border-bottom: 1px solid #30363d;
        flex-wrap: wrap;
      }
      label.field { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8b949e; }
      select {
        background: #161b22; color: #e6edf3; border: 1px solid #30363d;
        border-radius: 6px; padding: 7px 10px; font: inherit; min-width: 200px;
      }
      input[type='range'] { width: 130px; accent-color: #58a6ff; }
      .check { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #8b949e; user-select: none; }
      #info { font-size: 13px; color: #8b949e; }
      #info.err { color: #f85149; }
      #info b { color: #e6edf3; font-weight: 600; }
      .spacer { flex: 1; }

      .stage { position: relative; flex: 1; min-height: 0; }
      canvas { display: block; width: 100%; height: 100%; }
      .hint {
        position: absolute; top: 10px; right: 12px; color: #6e7681; font-size: 12px;
        background: rgba(13, 17, 23, 0.72); border: 1px solid #30363d;
        border-radius: 6px; padding: 4px 8px; pointer-events: none;
      }
      @media (max-width: 720px) {
        body { overflow: auto; }
        .stage { height: 65vh; }
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <header>
      <h1>str8 — straight-skeleton roofs (3D)</h1>
      <p>
        Each skeleton vertex is lifted to a height equal to its wavefront
        <code>time</code>, turning the straight skeleton into a roof. Sample
        polygons from
        <a href="https://github.com/LingDong-/interesting-polygon-archive" target="_blank" rel="noopener"
          >interesting-polygon-archive</a
        >. Rendered with three.js.
      </p>
    </header>

    <div class="toolbar">
      <label class="field">Polygon <select id="picker"></select></label>
      <label class="field">Pitch <input type="range" id="pitch" min="0.1" max="3" step="0.05" value="1" /></label>
      <label class="check"><input type="checkbox" id="edges" checked /> edges</label>
      <span id="info"></span>
      <span class="spacer"></span>
    </div>

    <div class="stage" id="stage">
      <canvas id="c"></canvas>
      <div class="hint">drag to orbit · scroll to zoom · right-drag to pan</div>
    </div>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { init, buildFromPolygon } from '../dist/str8.js';

      const $ = (id) => document.getElementById(id);
      const info = $('info');
      const setInfo = (html, err) => { info.innerHTML = html; info.className = err ? 'err' : ''; };

      // ---- three.js scene -------------------------------------------------
      const canvas = $('c');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0e1116);

      const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 5000);
      camera.position.set(30, 26, 30);

      const controls = new OrbitControls(camera, canvas);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;

      scene.add(new THREE.HemisphereLight(0xbfd4ff, 0x202830, 1.1));
      const sun = new THREE.DirectionalLight(0xffffff, 2.0);
      sun.position.set(18, 40, 24);
      scene.add(sun);

      const grid = new THREE.GridHelper(80, 40, 0x30363d, 0x21262d);
      grid.position.y = 0;
      scene.add(grid);

      // Everything we rebuild per-polygon lives under this group. Its Y scale
      // is the roof "pitch" — height lives on Y, the footprint on X/Z, so
      // scaling Y only changes steepness.
      const roof = new THREE.Group();
      scene.add(roof);

      const roofMat = new THREE.MeshStandardMaterial({
        color: 0xc26d4a, roughness: 0.85, metalness: 0.0,
        flatShading: true, side: THREE.DoubleSide,
      });
      const edgeMat = new THREE.LineBasicMaterial({ color: 0x10151c });

      let edgeLines = null;

      function clearRoof() {
        for (const child of [...roof.children]) {
          roof.remove(child);
          child.geometry?.dispose();
        }
        edgeLines = null;
      }

      const TARGET = 24; // footprint fits within ~this many world units

      // Build roof geometry from a skeleton {vertices:[x,y,time...], faces:[[i..]]}
      function buildRoof(skel, bounds) {
        clearRoof();
        const v = skel.vertices;
        const cx = (bounds.minX + bounds.maxX) / 2;
        const cy = (bounds.minY + bounds.maxY) / 2;
        const span = Math.max(bounds.maxX - bounds.minX, bounds.maxY - bounds.minY) || 1;
        const s = TARGET / span;

        const positions = [];
        let maxTime = 0;

        for (const face of skel.faces) {
          // The face projects to a simple polygon in (x, y); triangulate there,
          // then lift each vertex to height = time.
          const contour = face.map((idx) => new THREE.Vector2(v[idx * 3], v[idx * 3 + 1]));
          let tris;
          try { tris = THREE.ShapeUtils.triangulateShape(contour, []); } catch { tris = []; }
          for (const tri of tris) {
            for (const local of tri) {
              const gi = face[local];
              const x = v[gi * 3], y = v[gi * 3 + 1], t = v[gi * 3 + 2];
              if (t > maxTime) maxTime = t;
              positions.push((x - cx) * s, t * s, (y - cy) * s);
            }
          }
        }

        const geom = new THREE.BufferGeometry();
        geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geom.computeVertexNormals();
        roof.add(new THREE.Mesh(geom, roofMat));

        const edgeGeom = new THREE.EdgesGeometry(geom, 1); // ridges, hips, eaves
        edgeLines = new THREE.LineSegments(edgeGeom, edgeMat);
        edgeLines.visible = $('edges').checked;
        roof.add(edgeLines);

        applyPitch();
        frameCamera(s, span, maxTime);
        return { maxTime, s };
      }

      function applyPitch() {
        roof.scale.y = parseFloat($('pitch').value);
      }

      // Point the camera at the (pitched) roof and back off to frame it.
      function frameCamera(s, span, maxTime) {
        const footprint = span * s;
        const height = maxTime * s * roof.scale.y;
        const center = new THREE.Vector3(0, height / 2, 0);
        const dist = footprint * 1.5 + height;
        camera.position.set(center.x + dist * 0.75, center.y + dist * 0.6, center.z + dist * 0.75);
        camera.near = Math.max(0.1, dist / 1000);
        camera.far = dist * 50;
        camera.updateProjectionMatrix();
        controls.target.copy(center);
        controls.update();
        // Resize the ground grid to roughly match the footprint.
        grid.scale.setScalar(Math.max(1, footprint / 80) * 1.4);
      }

      // ---- Resize ---------------------------------------------------------
      function resize() {
        const { clientWidth: w, clientHeight: h } = $('stage');
        renderer.setSize(w, h, false);
        camera.aspect = w / Math.max(1, h);
        camera.updateProjectionMatrix();
      }
      new ResizeObserver(resize).observe($('stage'));
      resize();

      // ---- Render loop ----------------------------------------------------
      renderer.setAnimationLoop(() => {
        controls.update();
        renderer.render(scene, camera);
      });

      // ---- Data + interaction --------------------------------------------
      function compute(rings) {
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const ring of rings) for (const [x, y] of ring) {
          if (x < minX) minX = x; if (y < minY) minY = y;
          if (x > maxX) maxX = x; if (y > maxY) maxY = y;
        }

        let skel = null;
        try { skel = buildFromPolygon(rings); } catch {}
        if (!skel) { clearRoof(); setInfo('skeleton failed for this polygon', true); return; }

        const { maxTime, s } = buildRoof(skel, { minX, minY, maxX, maxY });
        const verts = rings.reduce((a, r) => a + r.length, 0);
        const holes = rings.length - 1;
        setInfo(
          `<b>${verts}</b> vertices · <b>${holes}</b> hole${holes === 1 ? '' : 's'} · ` +
            `<b>${skel.faces.length}</b> roof faces · ridge height <b>${maxTime.toFixed(1)}</b>`,
        );
      }

      let polygons = [];
      Promise.all([init(), fetch('polygons.json').then((r) => r.json())])
        .then(([, data]) => {
          polygons = data.polygons;
          for (const p of polygons) {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.label;
            $('picker').appendChild(opt);
          }
          const def = polygons.find((p) => p.id === 'mapbox-building') || polygons[0];
          $('picker').value = def.id;
          compute(def.rings);
        })
        .catch((e) => setInfo(`failed to load: ${e.message}`, true));

      $('picker').addEventListener('change', () => {
        const p = polygons.find((p) => p.id === $('picker').value);
        if (p) compute(p.rings);
      });
      $('pitch').addEventListener('input', applyPitch);
      $('edges').addEventListener('change', () => { if (edgeLines) edgeLines.visible = $('edges').checked; });
    </script>
  </body>
</html>
