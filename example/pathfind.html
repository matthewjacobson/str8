<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>str8 — central paths (via str8-path)</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0; font: 14px/1.5 system-ui, sans-serif;
        background: #0e1116; color: #e6edf3;
        display: flex; flex-direction: column; overflow: hidden;
      }
      header { padding: 14px 20px; border-bottom: 1px solid #30363d; flex: none; }
      h1 { font-size: 16px; margin: 0; }
      header p { margin: 4px 0 0; color: #8b949e; font-size: 13px; }
      header a { color: #58a6ff; text-decoration: none; }
      .toolbar {
        flex: none; display: flex; align-items: center; gap: 18px;
        padding: 12px 20px; border-bottom: 1px solid #30363d; flex-wrap: wrap;
      }
      label.field { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8b949e; }
      select { background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-radius: 6px; padding: 7px 10px; font: inherit; min-width: 170px; }
      input[type='range'] { width: 160px; accent-color: #58a6ff; }
      .check { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #8b949e; user-select: none; }
      #info { font-size: 13px; color: #8b949e; }
      #info b { color: #e6edf3; font-weight: 600; }
      .spacer { flex: 1; }
      button { background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #e6edf3; border-radius: 6px; cursor: pointer; }
      .zoom-btn { width: 34px; height: 34px; padding: 0; font-size: 18px; line-height: 1; }
      .canvas-wrap { position: relative; flex: 1; min-height: 0; background: #0e1116; }
      canvas { display: block; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
      canvas.grabbing { cursor: grabbing; }
      .overlay { position: absolute; display: flex; }
      .hint { top: 10px; right: 12px; color: #6e7681; font-size: 12px; background: rgba(13,17,23,0.72); border: 1px solid #30363d; border-radius: 6px; padding: 4px 8px; pointer-events: none; max-width: 320px; }
      .legend { right: 12px; bottom: 12px; gap: 14px; align-items: center; background: rgba(13,17,23,0.72); border: 1px solid #30363d; border-radius: 6px; padding: 6px 10px; color: #8b949e; font-size: 12px; }
      .swatch { display: inline-block; width: 12px; height: 3px; vertical-align: middle; }
      @media (max-width: 820px) { body { overflow: auto; } .canvas-wrap { height: 62vh; } }
    </style>

    <!-- Consumes the published str8-path package (npm CDN); @matthewjacobson/str8
         points at this repo's own local build. -->
    <script type="importmap">
      {
        "imports": {
          "str8-path": "https://cdn.jsdelivr.net/npm/str8-path@0.1.0/src/index.js",
          "@matthewjacobson/str8": "../dist/str8.js",
          "jsts/dist/jsts.min.js": "https://unpkg.com/jsts@2.12.1/dist/jsts.min.js"
        }
      }
    </script>
  </head>
  <body>
    <header>
      <h1>str8 — central paths through a polygon</h1>
      <p>
        Powered by <a href="https://github.com/matthewjacobson/str8-path" target="_blank" rel="noopener">str8-path</a>'s
        <code>PathFinder</code> — a path between two points routed through the
        polygon's straight skeleton. Drag the endpoints.
      </p>
    </header>

    <div class="toolbar">
      <label class="field">Polygon <select id="picker"></select></label>
      <label class="field">Direct ↔ Central <input type="range" id="centrality" min="0" max="100" step="1" value="45" /></label>
      <label class="check"><input type="checkbox" id="smooth" checked /> smooth</label>
      <span id="info"></span>
      <span class="spacer"></span>
      <button class="zoom-btn" id="fit" title="Fit">⤢</button>
      <button class="zoom-btn" id="zin" title="Zoom in">+</button>
      <button class="zoom-btn" id="zout" title="Zoom out">−</button>
    </div>

    <div class="canvas-wrap" id="wrap">
      <canvas id="c"></canvas>
      <div class="overlay hint">drag the A / B dots · drag empty space to pan · scroll to zoom</div>
      <div class="overlay legend">
        <span><span class="swatch" style="background:#58a6ff"></span> polygon</span>
        <span><span class="swatch" style="background:#e6edf3"></span> path</span>
        <span><span class="swatch" style="background:#6e7681"></span> skeleton</span>
      </div>
    </div>

    <script type="module">
      import { PathFinder, loadJsts } from 'str8-path';

      const $ = (id) => document.getElementById(id);
      const canvas = $('c');
      const ctx = canvas.getContext('2d');
      const info = $('info');
      let jsts, gf, C, ring, polyOf;

      // ---- camera ---------------------------------------------------------
      const cam = { scale: 1, ox: 0, oy: 0 };
      let dpr = 1, viewDirty = false;
      const sx = (x) => cam.ox + x * cam.scale, sy = (y) => cam.oy + y * cam.scale;
      const wx = (px) => (px - cam.ox) / cam.scale, wy = (py) => (py - cam.oy) / cam.scale;
      function sizeCanvas() {
        dpr = window.devicePixelRatio || 1;
        const w = Math.max(1, Math.round(canvas.clientWidth * dpr)), h = Math.max(1, Math.round(canvas.clientHeight * dpr));
        if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
      }
      function fitView() {
        if (!bounds) return;
        const W = canvas.clientWidth, H = canvas.clientHeight, pad = 44;
        const spanX = bounds.maxX - bounds.minX || 1, spanY = bounds.maxY - bounds.minY || 1;
        cam.scale = Math.min((W - pad * 2) / spanX, (H - pad * 2) / spanY);
        const cx = (bounds.minX + bounds.maxX) / 2, cy = (bounds.minY + bounds.maxY) / 2;
        cam.ox = W / 2 - cx * cam.scale; cam.oy = H / 2 - cy * cam.scale; viewDirty = false;
      }

      // ---- state ----------------------------------------------------------
      let polygons = [], rings = null, containerPoly = null, pf = null, bounds = null;
      let A = null, B = null, path = null;
      const containsPt = (x, y) => containerPoly.contains(gf.createPoint(C(x, y)));

      function placeEndpoints() {
        const N = 12, inside = [];
        for (let i = 0; i <= N; i++) for (let j = 0; j <= N; j++) {
          const x = bounds.minX + (bounds.maxX - bounds.minX) * (i / N);
          const y = bounds.minY + (bounds.maxY - bounds.minY) * (j / N);
          if (containsPt(x, y)) inside.push({ x, y });
        }
        let best = null;
        for (let i = 0; i < inside.length; i++) for (let j = i + 1; j < inside.length; j++) {
          const d = Math.hypot(inside[i].x - inside[j].x, inside[i].y - inside[j].y);
          if (!best || d > best.d) best = { d, a: inside[i], b: inside[j] };
        }
        if (best) { A = { ...best.a }; B = { ...best.b }; }
        else { A = { x: (bounds.minX + bounds.maxX) / 2, y: (bounds.minY + bounds.maxY) / 2 }; B = { ...A }; }
      }

      function loadPolygon(id) {
        rings = polygons.find((p) => p.id === id).rings;
        const outer = rings[0];
        let a = Infinity, b = Infinity, c = -Infinity, d = -Infinity;
        for (const [x, y] of outer) { a = Math.min(a, x); b = Math.min(b, y); c = Math.max(c, x); d = Math.max(d, y); }
        bounds = { minX: a, minY: b, maxX: c, maxY: d };
        containerPoly = polyOf(rings);
        pf = new PathFinder(containerPoly);   // precompute the skeleton once
        placeEndpoints();
        viewDirty = false; fitView();
        recompute();
      }

      function recompute() {
        const centrality = +$('centrality').value / 100;
        const smooth = $('smooth').checked;
        const r = pf.findPath(gf.createPoint(C(A.x, A.y)), gf.createPoint(C(B.x, B.y)), { centrality, smooth });
        path = r ? r.points : null;
        draw();
        info.innerHTML = r
          ? `length <b>${r.length.toFixed(0)}</b> · mean clearance <b>${r.clearance.mean.toFixed(1)}</b>`
          : 'no path';
      }

      // ---- draw -----------------------------------------------------------
      function marker(p, fill, label) {
        ctx.fillStyle = fill; ctx.beginPath(); ctx.arc(sx(p.x), sy(p.y), 6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#0e1116'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#0e1116'; ctx.font = 'bold 10px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(label, sx(p.x), sy(p.y));
      }
      function draw() {
        sizeCanvas();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
        if (!rings) return;
        if (pf && pf.skeleton) {
          const v = pf.skeleton.vertices;
          ctx.strokeStyle = '#2b313a'; ctx.lineWidth = 1;
          for (const face of pf.skeleton.faces) {
            ctx.beginPath();
            face.forEach((idx, k) => { const px = sx(v[idx * 3]), py = sy(v[idx * 3 + 1]); k === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); });
            ctx.closePath(); ctx.stroke();
          }
        }
        ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 2;
        for (const r of rings) {
          ctx.beginPath();
          r.forEach(([x, y], k) => { const px = sx(x), py = sy(y); k === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); });
          ctx.closePath(); ctx.stroke();
        }
        if (path && path.length > 1) {
          // dashed leader if an endpoint is outside the polygon
          ctx.setLineDash([5, 5]); ctx.strokeStyle = '#6e7681'; ctx.lineWidth = 1.5;
          if (!containsPt(A.x, A.y)) { ctx.beginPath(); ctx.moveTo(sx(A.x), sy(A.y)); ctx.lineTo(sx(path[0].x), sy(path[0].y)); ctx.stroke(); }
          if (!containsPt(B.x, B.y)) { ctx.beginPath(); ctx.moveTo(sx(B.x), sy(B.y)); ctx.lineTo(sx(path[path.length - 1].x), sy(path[path.length - 1].y)); ctx.stroke(); }
          ctx.setLineDash([]);
          ctx.lineJoin = 'round'; ctx.lineCap = 'round';
          for (const [w, col] of [[6, 'rgba(255,255,255,0.14)'], [3, '#e6edf3']]) {
            ctx.strokeStyle = col; ctx.lineWidth = w; ctx.beginPath();
            path.forEach((p, k) => { const px = sx(p.x), py = sy(p.y); k === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); });
            ctx.stroke();
          }
        }
        if (A) marker(A, '#ffffff', 'A');
        if (B) marker(B, '#ffd33d', 'B');
      }

      // ---- boot -----------------------------------------------------------
      await PathFinder.init();
      jsts = await loadJsts();
      gf = new jsts.geom.GeometryFactory();
      C = (x, y) => new jsts.geom.Coordinate(x, y);
      ring = (pts) => gf.createLinearRing([...pts, pts[0]].map(([x, y]) => C(x, y)));
      polyOf = (rs) => gf.createPolygon(ring(rs[0]), rs.slice(1).map(ring));

      const data = await fetch('polygons.json').then((r) => r.json());
      polygons = data.polygons;
      for (const p of polygons) { const o = document.createElement('option'); o.value = p.id; o.textContent = p.label; $('picker').appendChild(o); }
      const def = polygons.find((p) => p.id === 'skimage-horse') || polygons[0];
      $('picker').value = def.id;
      loadPolygon(def.id);

      // ---- interaction ----------------------------------------------------
      function pos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
      const screenDist = (p, px, py) => Math.hypot(sx(p.x) - px, sy(p.y) - py);
      let drag = null, lastX = 0, lastY = 0;
      canvas.addEventListener('pointerdown', (e) => {
        canvas.setPointerCapture(e.pointerId);
        const p = pos(e);
        if (A && screenDist(A, p.x, p.y) < 12) drag = 'A';
        else if (B && screenDist(B, p.x, p.y) < 12) drag = 'B';
        else { drag = 'view'; canvas.classList.add('grabbing'); lastX = e.clientX; lastY = e.clientY; }
      });
      canvas.addEventListener('pointermove', (e) => {
        if (!drag) return;
        if (drag === 'view') { cam.ox += e.clientX - lastX; cam.oy += e.clientY - lastY; lastX = e.clientX; lastY = e.clientY; viewDirty = true; draw(); return; }
        const p = pos(e), w = { x: wx(p.x), y: wy(p.y) };
        if (drag === 'A') A = w; else B = w;
        recompute();
      });
      const endDrag = () => { if (drag === 'view') canvas.classList.remove('grabbing'); drag = null; };
      canvas.addEventListener('pointerup', endDrag);
      canvas.addEventListener('pointercancel', endDrag);
      function zoomAt(mx, my, f) { const gx = wx(mx), gy = wy(my); cam.scale *= f; cam.ox = mx - gx * cam.scale; cam.oy = my - gy * cam.scale; viewDirty = true; draw(); }
      canvas.addEventListener('wheel', (e) => { e.preventDefault(); const p = pos(e); zoomAt(p.x, p.y, Math.exp(-e.deltaY * 0.0015)); }, { passive: false });
      canvas.addEventListener('dblclick', () => { viewDirty = false; fitView(); draw(); });
      $('zin').addEventListener('click', () => zoomAt(canvas.clientWidth / 2, canvas.clientHeight / 2, 1.25));
      $('zout').addEventListener('click', () => zoomAt(canvas.clientWidth / 2, canvas.clientHeight / 2, 1 / 1.25));
      $('fit').addEventListener('click', () => { viewDirty = false; fitView(); draw(); });
      $('picker').addEventListener('change', () => loadPolygon($('picker').value));
      $('centrality').addEventListener('input', recompute);
      $('smooth').addEventListener('change', recompute);
      new ResizeObserver(() => { sizeCanvas(); if (!viewDirty) fitView(); draw(); }).observe($('wrap'));
    </script>
  </body>
</html>
