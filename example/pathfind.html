<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>str8 — central paths</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0; font: 14px/1.5 system-ui, sans-serif;
        background: #0e1116; color: #e6edf3;
        display: flex; flex-direction: column; overflow: hidden;
      }
      header { padding: 14px 20px; border-bottom: 1px solid #30363d; flex: none; }
      h1 { font-size: 16px; margin: 0; }
      header p { margin: 4px 0 0; color: #8b949e; font-size: 13px; }
      header a { color: #58a6ff; text-decoration: none; }

      .toolbar {
        flex: none; display: flex; align-items: center; gap: 18px;
        padding: 12px 20px; border-bottom: 1px solid #30363d; flex-wrap: wrap;
      }
      label.field { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #8b949e; }
      select {
        background: #161b22; color: #e6edf3; border: 1px solid #30363d;
        border-radius: 6px; padding: 7px 10px; font: inherit; min-width: 180px;
      }
      input[type='range'] { width: 160px; accent-color: #58a6ff; }
      .check { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #8b949e; user-select: none; }
      #info { font-size: 13px; color: #8b949e; }
      #info b { color: #e6edf3; font-weight: 600; }
      .spacer { flex: 1; }
      button {
        background: rgba(22, 27, 34, 0.9); border: 1px solid #30363d; color: #e6edf3;
        border-radius: 6px; font: inherit; cursor: pointer;
      }
      .btn { padding: 7px 12px; font-size: 13px; font-weight: 600; }
      .zoom-btn { width: 34px; height: 34px; padding: 0; font-size: 18px; line-height: 1; }

      .canvas-wrap { position: relative; flex: 1; min-height: 0; background: #0e1116; }
      canvas { display: block; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
      canvas.grabbing { cursor: grabbing; }
      .overlay { position: absolute; display: flex; }
      .hint {
        top: 10px; right: 12px; color: #6e7681; font-size: 12px;
        background: rgba(13, 17, 23, 0.72); border: 1px solid #30363d;
        border-radius: 6px; padding: 4px 8px; pointer-events: none; max-width: 320px;
      }
      .legend {
        right: 12px; bottom: 12px; gap: 14px; align-items: center;
        background: rgba(13, 17, 23, 0.72); border: 1px solid #30363d;
        border-radius: 6px; padding: 6px 10px; color: #8b949e; font-size: 12px;
      }
      .swatch { display: inline-block; width: 12px; height: 3px; vertical-align: middle; }
      @media (max-width: 820px) { body { overflow: auto; } .canvas-wrap { height: 62vh; } }
    </style>
  </head>
  <body>
    <header>
      <h1>str8 — central paths through a polygon</h1>
      <p>
        A path between two points routed along the straight skeleton (the
        polygon's spine). Sample polygons from
        <a href="https://github.com/LingDong-/interesting-polygon-archive" target="_blank" rel="noopener"
          >interesting-polygon-archive</a
        >.
      </p>
    </header>

    <div class="toolbar">
      <label class="field">Polygon <select id="picker"></select></label>
      <label class="field">Direct ↔ Central <input type="range" id="alpha" min="0" max="100" step="1" value="40" /></label>
      <label class="check"><input type="checkbox" id="smooth" checked /> smooth</label>
      <label class="check"><input type="checkbox" id="spine" checked /> spine entry</label>
      <label class="check"><input type="checkbox" id="vis" checked /> keep inside</label>
      <button class="btn" id="reset">Reset points</button>
      <span id="info"></span>
      <span class="spacer"></span>
      <button class="zoom-btn" id="fit" title="Fit">⤢</button>
      <button class="zoom-btn" id="zin" title="Zoom in">+</button>
      <button class="zoom-btn" id="zout" title="Zoom out">−</button>
    </div>

    <div class="canvas-wrap" id="wrap">
      <canvas id="c"></canvas>
      <div class="overlay hint">click to place A then B · drag the dots to move · drag empty space to pan · scroll to zoom</div>
      <div class="overlay legend">
        <span><span class="swatch" style="background:#58a6ff"></span> polygon</span>
        <span><span class="swatch" style="background:#3fb950"></span> path</span>
        <span><span class="swatch" style="background:#6e7681"></span> skeleton</span>
      </div>
    </div>

    <script type="module">
      import { init, buildFromPolygon } from '../dist/str8.js';
      import { findCentralPath, buildSkeletonGraph, stringPull, smoothPath, pathStats, clampInside, pointInPolygon } from './pathfind.js';

      const $ = (id) => document.getElementById(id);
      const canvas = $('c');
      const ctx = canvas.getContext('2d');
      const info = $('info');

      // ---- camera (world -> screen, CSS px; y down) ----------------------
      const cam = { scale: 1, ox: 0, oy: 0 };
      let dpr = 1, viewDirty = false;
      const sx = (x) => cam.ox + x * cam.scale;
      const sy = (y) => cam.oy + y * cam.scale;
      const wx = (px) => (px - cam.ox) / cam.scale;
      const wy = (py) => (py - cam.oy) / cam.scale;

      function sizeCanvas() {
        dpr = window.devicePixelRatio || 1;
        const w = Math.max(1, Math.round(canvas.clientWidth * dpr));
        const h = Math.max(1, Math.round(canvas.clientHeight * dpr));
        if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
      }
      function fitView() {
        if (!bounds) return;
        const W = canvas.clientWidth, H = canvas.clientHeight, pad = 44;
        const { minX, minY, maxX, maxY } = bounds;
        const spanX = maxX - minX || 1, spanY = maxY - minY || 1;
        cam.scale = Math.min((W - pad * 2) / spanX, (H - pad * 2) / spanY);
        const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
        cam.ox = W / 2 - cx * cam.scale; cam.oy = H / 2 - cy * cam.scale;
        viewDirty = false;
      }

      // ---- state ----------------------------------------------------------
      let polygons = [], rings = null, skel = null, graph = null, bounds = null, maxClr = 1;
      let A = null, B = null, path = null;

      function computeBounds() {
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const r of rings) for (const [x, y] of r) {
          if (x < minX) minX = x; if (y < minY) minY = y;
          if (x > maxX) maxX = x; if (y > maxY) maxY = y;
        }
        bounds = { minX, minY, maxX, maxY };
      }

      function centroid(ring) { let x = 0, y = 0; for (const [a, b] of ring) { x += a; y += b; } return { x: x / ring.length, y: y / ring.length }; }

      function defaultPoints() {
        const outer = rings[0], c = centroid(outer);
        const nudge = (p) => clampInside(rings, { x: p[0] + (c.x - p[0]) * 0.12, y: p[1] + (c.y - p[1]) * 0.12 });
        A = nudge(outer[0]);
        B = nudge(outer[Math.floor(outer.length / 2)]);
      }

      function recompute() {
        const t = parseInt($('alpha').value) / 100; // 0 (direct) .. 1 (central)
        const visibility = $('vis').checked;
        const attachMode = $('spine').checked ? 'faceNode' : 'edge';
        let p = A && B ? findCentralPath(skel, rings, A, B, { alpha: t * 16, visibility, attachMode }) : null;
        if (p) {
          // Slider also sets the string-pull clearance bound: 0 = pull taut
          // (direct), high = keep the path fat and central.
          p = stringPull(p, rings, { minClearance: t * 0.5 * maxClr });
          if ($('smooth').checked) p = smoothPath(p, rings, {});
        }
        path = p;
        draw();
        if (!A || !B) { info.innerHTML = 'click in the polygon to place point A'; return; }
        if (!path) { info.innerHTML = 'no path found'; return; }
        const s = pathStats(path);
        info.innerHTML = `length <b>${s.length.toFixed(0)}</b> · mean clearance <b>${s.meanClearance.toFixed(1)}</b>`;
      }

      function loadPolygon(id) {
        const p = polygons.find((p) => p.id === id);
        rings = p.rings;
        skel = buildFromPolygon(rings);
        graph = buildSkeletonGraph(skel);
        maxClr = Math.max(1e-9, ...graph.nodes.map((n) => n.t));
        computeBounds();
        defaultPoints();
        viewDirty = false; fitView();
        recompute();
      }

      // ---- draw -----------------------------------------------------------
      function marker(p, fill, label) {
        ctx.fillStyle = fill;
        ctx.beginPath(); ctx.arc(sx(p.x), sy(p.y), 6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#0e1116'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#0e1116'; ctx.font = 'bold 10px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(label, sx(p.x), sy(p.y));
      }

      function draw() {
        sizeCanvas();
        const W = canvas.clientWidth, H = canvas.clientHeight;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, W, H);
        if (!rings) return;

        // skeleton (faint)
        ctx.strokeStyle = '#2b313a'; ctx.lineWidth = 1;
        for (const e of graph.edges) {
          ctx.beginPath();
          ctx.moveTo(sx(graph.nodes[e.a].x), sy(graph.nodes[e.a].y));
          ctx.lineTo(sx(graph.nodes[e.b].x), sy(graph.nodes[e.b].y));
          ctx.stroke();
        }

        // polygon
        ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 2;
        for (const ring of rings) {
          ctx.beginPath();
          ring.forEach(([x, y], k) => { const px = sx(x), py = sy(y); k === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); });
          ctx.closePath(); ctx.stroke();
        }

        // path (white halo + green line)
        if (path && path.length > 1) {
          ctx.lineJoin = 'round'; ctx.lineCap = 'round';
          for (const [w, col] of [[6, 'rgba(255,255,255,0.12)'], [3, '#3fb950']]) {
            ctx.strokeStyle = col; ctx.lineWidth = w;
            ctx.beginPath();
            path.forEach((p, k) => { const px = sx(p.x), py = sy(p.y); k === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); });
            ctx.stroke();
          }
        }

        if (A) marker(A, '#ffffff', 'A');
        if (B) marker(B, '#ffd33d', 'B');
      }

      // ---- boot -----------------------------------------------------------
      Promise.all([init(), fetch('polygons.json').then((r) => r.json())]).then(([, data]) => {
        polygons = data.polygons;
        for (const p of polygons) {
          const opt = document.createElement('option');
          opt.value = p.id; opt.textContent = p.label; $('picker').appendChild(opt);
        }
        const def = polygons.find((p) => p.id === 'matisse-blue') || polygons[0];
        $('picker').value = def.id;
        loadPolygon(def.id);
      }).catch((e) => { info.innerHTML = `failed to load: ${e.message}`; });

      // ---- interaction ----------------------------------------------------
      function pos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
      function screenDist(P, px, py) { return Math.hypot(sx(P.x) - px, sy(P.y) - py); }

      let drag = null; // 'A' | 'B' | 'view' | null
      let mightClick = false, downClient = null;

      canvas.addEventListener('pointerdown', (e) => {
        const p = pos(e);
        canvas.setPointerCapture(e.pointerId);
        downClient = { x: e.clientX, y: e.clientY };
        if (A && screenDist(A, p.x, p.y) < 12) drag = 'A';
        else if (B && screenDist(B, p.x, p.y) < 12) drag = 'B';
        else { drag = 'view'; mightClick = true; canvas.classList.add('grabbing'); }
        lastX = e.clientX; lastY = e.clientY;
      });

      let lastX = 0, lastY = 0;
      canvas.addEventListener('pointermove', (e) => {
        if (!drag) return;
        if (drag === 'A' || drag === 'B') {
          const p = pos(e);
          const w = clampInside(rings, { x: wx(p.x), y: wy(p.y) });
          if (drag === 'A') A = w; else B = w;
          recompute();
        } else if (drag === 'view') {
          const dx = e.clientX - lastX, dy = e.clientY - lastY;
          if (Math.abs(e.clientX - downClient.x) + Math.abs(e.clientY - downClient.y) > 4) mightClick = false;
          cam.ox += dx; cam.oy += dy; lastX = e.clientX; lastY = e.clientY; viewDirty = true; draw();
        }
      });

      function placePoint(p) {
        const w = clampInside(rings, { x: wx(p.x), y: wy(p.y) });
        if (!A) A = w;
        else if (!B) B = w;
        else {
          // move whichever endpoint is nearer the click
          const dA = screenDist(A, p.x, p.y), dB = screenDist(B, p.x, p.y);
          if (dA <= dB) A = w; else B = w;
        }
        recompute();
      }

      canvas.addEventListener('pointerup', (e) => {
        canvas.classList.remove('grabbing');
        if (drag === 'view' && mightClick) placePoint(pos(e));
        drag = null; mightClick = false;
      });
      canvas.addEventListener('pointercancel', () => { drag = null; mightClick = false; canvas.classList.remove('grabbing'); });

      function zoomAt(mx, my, f) {
        const gx = wx(mx), gy = wy(my);
        cam.scale *= f; cam.ox = mx - gx * cam.scale; cam.oy = my - gy * cam.scale;
        viewDirty = true; draw();
      }
      canvas.addEventListener('wheel', (e) => { e.preventDefault(); const p = pos(e); zoomAt(p.x, p.y, Math.exp(-e.deltaY * 0.0015)); }, { passive: false });
      canvas.addEventListener('dblclick', () => { viewDirty = false; fitView(); draw(); });

      const centerZoom = (f) => zoomAt(canvas.clientWidth / 2, canvas.clientHeight / 2, f);
      $('zin').addEventListener('click', () => centerZoom(1.25));
      $('zout').addEventListener('click', () => centerZoom(1 / 1.25));
      $('fit').addEventListener('click', () => { viewDirty = false; fitView(); draw(); });

      $('picker').addEventListener('change', () => loadPolygon($('picker').value));
      $('alpha').addEventListener('input', recompute);
      $('smooth').addEventListener('change', recompute);
      $('spine').addEventListener('change', recompute);
      $('vis').addEventListener('change', recompute);
      $('reset').addEventListener('click', () => { defaultPoints(); recompute(); });

      new ResizeObserver(() => { sizeCanvas(); if (!viewDirty) fitView(); draw(); }).observe($('wrap'));
    </script>
  </body>
</html>
